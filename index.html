<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frendhi Saido Danaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bg.moon {
      background-image: url('moon.jpg');
      animation: glitch 4s infinite;
    }

    .bg.earth {
      background-image: url('earth-rise.jpg');
      background-position: center bottom;
      animation: slowZoom 20s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    @keyframes glitch {
      0%, 92%, 100% { transform: translate(0); filter: none; }
      93% { transform: translate(-4px, 2px); filter: hue-rotate(90deg) saturate(2); }
      94% { transform: translate(4px, -2px); filter: hue-rotate(180deg); }
      95% { transform: translate(-2px, 0); filter: hue-rotate(270deg) saturate(3); }
      96% { transform: translate(3px, 1px) skewX(2deg); filter: hue-rotate(60deg); }
      97% { transform: translate(0, -3px); filter: none; }
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 480px;
      background: rgba(0, 0, 0, 0.76);
      backdrop-filter: blur(8px);
    }

    img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 2rem;
      filter: grayscale(1);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.8rem;
      font-weight: 400;
      line-height: 1.6;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid #333;
      padding: 0.75rem 2rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .links a:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <main>
    <img src="fren.jpeg" alt="">
    <h1>Frendhi Saido Danaro</h1>
    <p>Engineering Manager. Tech Leadership. Product Engineering. GenAI Explorer. Based in Bandung, Indonesia.</p>
    <div class="links">
      <a href="https://www.linkedin.com/in/fsdanaro">LinkedIn</a>
      <a href="https://dev.to/frendhisaido">Dev.to</a>
    </div>
  </main>
  <script>
    document.getElementById('bg').classList.add(Math.random() < 0.5 ? 'moon' : 'earth');
  </script>
</body>
</html>
